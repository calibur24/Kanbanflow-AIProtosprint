<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KanbanFlow Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f4f7fc;
            --text-main: #2d3748;
            --text-light: #718096;
            --todo-color: #3b82f6; 
            --in-progress-color: #f59e0b; 
            --done-color: #10b981; 
            --danger-color: #ef4444;
        }

        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-color); color: var(--text-main); padding: 30px; margin: 0; }
        .header-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 20px auto; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .header-right { display: flex; gap: 10px; }
        h1 { font-weight: 700; color: #1a202c; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        .board-selector { padding: 8px 15px; border-radius: 8px; border: 1px solid #cbd5e1; font-weight: 600; cursor: pointer; background: white; }
        .btn-primary { background-color: var(--todo-color); color: white; border: none; padding: 10px 20px; font-weight: 600; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3); transition: 0.2s; }
        .btn-primary:hover { transform: translateY(-2px); background-color: #2563eb; }
        .btn-secondary { background-color: white; border: 1px solid #cbd5e1; padding: 10px 20px; font-weight: 600; border-radius: 8px; cursor: pointer; }

        .summary-board { display: flex; justify-content: center; gap: 20px; max-width: 1200px; margin: 0 auto 30px auto; }
        .summary-card { background: white; padding: 15px 25px; border-radius: 10px; flex: 1; max-width: 250px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-top: 4px solid transparent; }
        .summary-todo { border-top-color: var(--todo-color); }
        .summary-progress { border-top-color: var(--in-progress-color); }
        .summary-done { border-top-color: var(--done-color); }
        .summary-card p { margin: 0; font-size: 2rem; font-weight: 700; }

        .board { display: flex; gap: 25px; max-width: 1200px; margin: 0 auto; }
        .column { flex: 1; background: #ffffff; padding: 20px; border-radius: 12px; min-height: 500px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid transparent; }
        #col-To-Do { border-top-color: var(--todo-color); background-color: #eff6ff; }
        #col-In-Progress { border-top-color: var(--in-progress-color); background-color: #fffbeb; }
        #col-Done { border-top-color: var(--done-color); background-color: #ecfdf5; }

        .task-card { background: #ffffff; padding: 18px; margin-bottom: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.08); cursor: grab; position: relative; border: 1px solid #edf2f7; transition: 0.2s; }
        .task-card:hover { transform: translateY(-4px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        
        .card-actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 8px; }
        .action-btn { background: none; border: none; color: #cbd5e1; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .action-btn:hover { color: var(--todo-color); }
        .delete-btn:hover { color: var(--danger-color); }

        .priority-tag { font-size: 0.7rem; font-weight: 700; padding: 3px 8px; border-radius: 12px; text-transform: uppercase; margin-right: 50px; }
        .priority-high { background: #fee2e2; color: #ef4444; }
        .priority-medium { background: #fef3c7; color: #d97706; }
        .priority-low { background: #e0e7ff; color: #4f46e5; }

        .task-title { margin: 10px 0 5px 0; font-size: 1rem; font-weight: 600; }
        .task-desc { font-size: 0.85rem; color: var(--text-light); margin-bottom: 12px; }
        .task-footer { display: flex; flex-direction: column; gap: 5px; border-top: 1px solid #eee; padding-top: 10px; }
        
        .assignee-label { font-size: 0.75rem; font-weight: 500; color: var(--text-main); display: flex; align-items: center; gap: 5px; }
        .due-date-label { font-size: 0.7rem; color: var(--text-light); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; }
        .modal { background: white; padding: 25px; border-radius: 12px; width: 350px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="header-left">
            <h1>🚀 KanbanFlow</h1>
            <select id="boardSelector" class="board-selector" onchange="changeBoard()"></select>
        </div>
        <div class="header-right">
            <button class="btn-secondary" onclick="openTeamModal()">👥 Team</button>
            <button class="btn-primary" onclick="openModal()">+ Task</button>
        </div>
    </div>

    <div class="summary-board" id="summaryBoard">
        <div class="summary-card summary-todo"><h3>Pending</h3><p id="count-todo">0</p></div>
        <div class="summary-card summary-progress"><h3>In Progress</h3><p id="count-progress">0</p></div>
        <div class="summary-card summary-done"><h3>Completed</h3><p id="count-done">0</p></div>
    </div>

    <div id="loading" style="text-align:center;">Syncing...</div>
    
    <div class="board" id="board" style="display: none;">
        <div class="column" id="col-To-Do" ondragover="allowDrop(event)" ondrop="drop(event, 'To-Do')"><h2>To-Do</h2><div class="task-list" id="tasks-To-Do"></div></div>
        <div class="column" id="col-In-Progress" ondragover="allowDrop(event)" ondrop="drop(event, 'In Progress')"><h2>In Progress</h2><div class="task-list" id="tasks-In Progress"></div></div>
        <div class="column" id="col-Done" ondragover="allowDrop(event)" ondrop="drop(event, 'Done')"><h2>Done</h2><div class="task-list" id="tasks-Done"></div></div>
    </div>

    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <h2 id="modalTitle">New Task</h2>
            <input type="hidden" id="editTaskId">
            <div class="form-group"><label>Title</label><input type="text" id="taskTitle"></div>
            <div class="form-group"><label>Description</label><textarea id="taskDesc"></textarea></div>
            <div class="form-group"><label>Priority</label><select id="taskPriority"><option>Low</option><option selected>Medium</option><option>High</option></select></div>
            <div class="form-group"><label>Due Date</label><input type="date" id="taskDueDate"></div>
            <div class="form-group"><label>Assignee</label><select id="taskAssignee"></select></div>
            <div style="text-align:right;"><button class="btn-secondary" onclick="closeModal()">Cancel</button> <button class="btn-primary" onclick="saveTask()">Save</button></div>
        </div>
    </div>

    <div class="modal-overlay" id="teamModal">
        <div class="modal">
            <h2>Team Roster</h2>
            <div id="teamListUI" style="margin-bottom:15px; max-height:100px; overflow:auto; border:1px solid #eee; padding:5px;"></div>
            <div class="form-group"><label>New Member</label><input type="text" id="newMemberName"></div>
            <button class="btn-primary" style="width:100%;" onclick="addTeamMember()">Add Member</button>
            <button class="btn-secondary" style="width:100%; margin-top:10px;" onclick="closeTeamModal()">Close</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://lzzheaafvhnjbqqqtjds.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6emhlYWFmdmhuamJxcXF0amRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMjY4ODQsImV4cCI6MjA4ODkwMjg4NH0.t9h-uExZWGb01wFBcHAjuvfG75ieDj7Lnc5Ztjd9UYk';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentBoardId = null;
        let allTasks = [];

        async function init() { await loadTeamMembers(); await loadBoards(); }

        async function loadBoards() {
            const { data } = await db.from('boards').select('*').order('id', { ascending: true });
            document.getElementById('boardSelector').innerHTML = data.map(b => `<option value="${b.id}">${b.title}</option>`).join('');
            if (data.length > 0) { currentBoardId = data[0].id; fetchTasks(); }
        }

        async function fetchTasks() {
            const { data } = await db.from('tasks').select('*, team_members(name)').eq('board_id', currentBoardId).order('id', { ascending: true });
            allTasks = data;
            renderBoard(data);
        }

        function renderBoard(tasks) {
            ['To-Do', 'In Progress', 'Done'].forEach(s => document.getElementById(`tasks-${s}`).innerHTML = '');
            let counts = { 'To-Do': 0, 'In Progress': 0, 'Done': 0 };

            tasks.forEach(t => {
                counts[t.status]++;
                const card = document.createElement('div');
                card.className = 'task-card'; card.id = `task-${t.id}`; card.draggable = true; card.ondragstart = (e) => e.dataTransfer.setData("text", card.id);
                
                const assigneeName = t.team_members ? t.team_members.name : 'Unassigned';

                card.innerHTML = `
                    <div class="card-actions">
                        <button class="action-btn" onclick="openEditModal(${t.id})">✏️</button>
                        <button class="action-btn delete-btn" onclick="deleteTask(${t.id})">×</button>
                    </div>
                    <span class="priority-tag priority-${t.priority.toLowerCase()}">${t.priority}</span>
                    <h3 class="task-title">${t.title}</h3>
                    <div class="task-desc">${marked.parse(t.description || '')}</div>
                    <div class="task-footer">
                        <div class="assignee-label">👤 ${assigneeName}</div>
                        <div class="due-date-label">📅 Due: ${t.due_date || 'N/A'}</div>
                    </div>
                `;
                document.getElementById(`tasks-${t.status}`).appendChild(card);
            });

            document.getElementById('count-todo').innerText = counts['To-Do'];
            document.getElementById('count-progress').innerText = counts['In Progress'];
            document.getElementById('count-done').innerText = counts['Done'];
            document.getElementById('loading').style.display = 'none';
            document.getElementById('board').style.display = 'flex';
        }

        function openModal() {
            document.getElementById('modalTitle').innerText = "New Task";
            document.getElementById('editTaskId').value = "";
            document.getElementById('taskTitle').value = "";
            document.getElementById('taskDesc').value = "";
            document.getElementById('taskModal').style.display = 'flex';
        }

        function openEditModal(id) {
            const task = allTasks.find(t => t.id === id);
            document.getElementById('modalTitle').innerText = "Edit Task";
            document.getElementById('editTaskId').value = task.id;
            document.getElementById('taskTitle').value = task.title;
            document.getElementById('taskDesc').value = task.description;
            document.getElementById('taskPriority').value = task.priority;
            document.getElementById('taskDueDate').value = task.due_date || "";
            document.getElementById('taskAssignee').value = task.assignee_id || "";
            document.getElementById('taskModal').style.display = 'flex';
        }

        async function saveTask() {
            const id = document.getElementById('editTaskId').value;
            const taskData = {
                title: document.getElementById('taskTitle').value,
                description: document.getElementById('taskDesc').value,
                priority: document.getElementById('taskPriority').value,
                due_date: document.getElementById('taskDueDate').value || null,
                assignee_id: document.getElementById('taskAssignee').value || null,
                board_id: currentBoardId
            };

            if (id) { await db.from('tasks').update(taskData).eq('id', id); } 
            else { await db.from('tasks').insert([{...taskData, status: 'To-Do'}]); }
            closeModal(); fetchTasks();
        }

        async function deleteTask(id) {
            if (confirm("Delete permanently?")) { await db.from('tasks').delete().eq('id', id); fetchTasks(); }
        }

        async function drop(e, status) {
            e.preventDefault();
            const id = e.dataTransfer.getData("text").replace('task-', '');
            await db.from('tasks').update({ status }).eq('id', id);
            fetchTasks();
        }

        function allowDrop(e) { e.preventDefault(); }
        function closeModal() { document.getElementById('taskModal').style.display = 'none'; }
        function openTeamModal() { document.getElementById('teamModal').style.display = 'flex'; }
        function closeTeamModal() { document.getElementById('teamModal').style.display = 'none'; }
        function changeBoard() { currentBoardId = document.getElementById('boardSelector').value; fetchTasks(); }

        async function loadTeamMembers() {
            const { data } = await db.from('team_members').select('*');
            document.getElementById('taskAssignee').innerHTML = '<option value="">Unassigned</option>' + data.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
            document.getElementById('teamListUI').innerHTML = data.map(m => `<div>👤 ${m.name}</div>`).join('');
        }

        async function addTeamMember() {
            const name = document.getElementById('newMemberName').value;
            if (name) { await db.from('team_members').insert([{ name }]); document.getElementById('newMemberName').value = ''; loadTeamMembers(); }
        }

        init();
    </script>
</body>
</html>
